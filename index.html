<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete de Miniaturas</title>
    <style>
        /* Importar fuente personalizada desde GitHub */
        @font-face {
            font-family: 'CaslonAntique';
            src: url('https://raw.githubusercontent.com/artefactos-de-marcos/gabinete/main/assets/fonts/CaslonAntique.ttf') format('truetype');
            font-display: swap;
        }

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Press Start 2P', cursive;
            color: #e0e0e0;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* --- Pantalla de Presentación (Intro) --- */
        #intro-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Separa título (arriba) y botón (abajo) */
            padding: 8vh 0 5vh 0;
            box-sizing: border-box;
            z-index: 30;
            overflow: hidden;
            pointer-events: auto;
        }

        #intro-video {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 1;
            object-fit: cover;
            opacity: 0; 
            transition: opacity 0.1s ease-in;
        }

        /* Contenedor Superior (Título) */
        .intro-top-layer {
            position: relative;
            z-index: 6;
            text-align: center;
            background: transparent; /* Sin fondo */
        }

        /* Estilo del Título tipo Warhammer (Dorado, borde rojo, 3D) */
        #intro-title {
            font-family: 'CaslonAntique', serif;
            font-size: 5.5rem;
            color: #f0d77b; /* Dorado */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            -webkit-text-stroke: 2px #cc0000;
            paint-order: stroke fill;
            text-shadow: 
                2px 2px 0 #8b0000,
                4px 4px 0 #800000,
                5px 5px 0 #600000,
                6px 6px 8px rgba(0,0,0,0.9);
        }

        /* Contenedor Inferior (Botón y Crédito) */
        .intro-bottom-layer {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            background: transparent; /* Sin fondo */
        }

        #intro-start-btn {
            font-family: 'CaslonAntique', serif;
            font-size: 1.4rem;
            padding: 8px 40px;
            background: transparent; /* Totalmente transparente */
            color: #f4e4c1;
            border: 2px solid #f4e4c1;
            cursor: pointer;
            transition: 0.3s all;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px black; /* Sombra para que sea legible */
        }

        #intro-start-btn:hover {
            background: #f4e4c1;
            color: #1a1a1a;
            box-shadow: 0 0 15px #f4e4c1;
        }

        #intro-credit {
            font-family: 'CaslonAntique', serif;
            font-size: 1rem;
            color: #aaa;
            text-shadow: 2px 2px 4px black; /* Sombra para legibilidad */
            margin: 0;
        }

        /* --- Pantalla de Selección de Raza --- */
        #race-selection {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #race-selection h1 {
            font-family: 'CaslonAntique', serif;
            font-size: 3rem;
            margin-bottom: 40px;
            color: #f0d77b;
            -webkit-text-stroke: 1px #cc0000;
            paint-order: stroke fill;
            text-shadow: 3px 3px 0 #600000;
        }

        .race-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 800px;
        }

        .race-btn {
            background: #2b2b2b;
            border: 4px solid #555;
            color: #fff;
            padding: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .race-btn:hover {
            background: #4a0000;
            border-color: #ffcc00;
            transform: scale(1.05);
        }

        /* --- Interfaz de Construcción --- */
        #builder-ui {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 250px;
            height: 100%;
            background: rgba(20, 20, 20, 0.9);
            border-right: 4px solid #555;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: auto;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 30px;
        }

        .panel-title {
            font-size: 0.7rem;
            color: #ffcc00;
            margin-bottom: 10px;
            border-bottom: 2px solid #555;
            padding-bottom: 5px;
        }

        select, button {
            width: 100%;
            background: #333;
            color: #fff;
            border: 2px solid #777;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.6rem;
        }

        input[type="color"] {
            width: 50px;
            height: 30px;
            border: none;
            background: none;
            cursor: pointer;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #555; border: 2px solid #1a1a1a; }
    </style>
</head>
<body>

    <!-- Contenedor 3D -->
    <div id="canvas-container"></div>

    <!-- Interfaz de Usuario -->
    <div id="ui-overlay">
        
        <!-- Pantalla de Presentación -->
        <div id="intro-screen">
            <video id="intro-video" src="https://raw.githubusercontent.com/artefactos-de-marcos/gabinete/main/assets/intro.mp4" muted playsinline></video>
            
            <div class="intro-top-layer">
                <h1 id="intro-title">Gabinete de miniaturas</h1>
            </div>
            
            <div class="intro-bottom-layer">
                <button id="intro-start-btn">Empezar</button>
                <p id="intro-credit">Diseñado por Marcos Alfonzo.</p>
            </div>
        </div>

        <!-- Selección de Raza -->
        <div id="race-selection">
            <h1>Elige tu ejército</h1>
            <div class="race-grid">
                <button class="race-btn" onclick="startGame('Imperio')">Imperio</button>
                <button class="race-btn" onclick="startGame('Bretonia')">Bretonia</button>
                <button class="race-btn" onclick="startGame('Enanos')">Enanos</button>
                <button class="race-btn" onclick="startGame('Altos Elfos')">Altos Elfos</button>
                <button class="race-btn" onclick="startGame('Orcos')">Orcos</button>
                <button class="race-btn" onclick="startGame('Elfos Silvanos')">Elfos Silvanos</button>
                <button class="race-btn" onclick="startGame('No Muertos')">No Muertos</button>
            </div>
        </div>

        <!-- UI de Construcción -->
        <div id="builder-ui">
            <div class="panel-section">
                <div class="panel-title">RAZA</div>
                <div id="current-race" style="font-size: 0.8rem; color:#fff;">-</div>
            </div>

            <div class="panel-section">
                <div class="panel-title">EQUIPAMIENTO</div>
                <select id="unit-type" onchange="updateSprite()">
                    <option value="infanteria">Infantería</option>
                    <option value="caballeria">Caballería</option>
                </select>
                <select id="weapon-type" onchange="updateSprite()">
                    <option value="espada">Espada</option>
                    <option value="lanza">Lanza</option>
                    <option value="arco">Arco</option>
                </select>
                <select id="shield-type" onchange="updateSprite()">
                    <option value="escudo">Escudo</option>
                    <option value="sin_escudo">Sin Escudo</option>
                </select>
                <select id="banner-type" onchange="updateSprite()">
                    <option value="estandarte">Estandarte</option>
                    <option value="sin_estandarte">Sin Estandarte</option>
                </select>
            </div>

            <div class="panel-section">
                <div class="panel-title">PINTURA</div>
                <div class="color-picker-container">
                    Base <input type="color" id="color-base" value="#4a3018" onchange="updateSprite()">
                </div>
                <div class="color-picker-container">
                    Principal <input type="color" id="color-primary" value="#b0b0b0" onchange="updateSprite()">
                </div>
                <div class="color-picker-container">
                    Secundario <input type="color" id="color-secondary" value="#ff0000" onchange="updateSprite()">
                </div>
                <div class="color-picker-container">
                    Estandarte <input type="color" id="color-banner" value="#ffcc00" onchange="updateSprite()">
                </div>
            </div>
        </div>
    </div>

    <!-- Librería Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- Lógica de Presentación ---
        const introVideo = document.getElementById('intro-video');
        const introScreen = document.getElementById('intro-screen');
        const introStartBtn = document.getElementById('intro-start-btn');

        // 1. Inicia el video con la app pero páusalo
        introVideo.pause();
        introVideo.currentTime = 0; 

        // 2. Deja que comience luego de dos segundos
        setTimeout(() => {
            introVideo.style.opacity = 1;
            introVideo.play().catch(e => console.error("Error al reproducir el video:", e));
        }, 2000);

        // Al hacer clic en "Empezar", ocultar la intro y mostrar selección de raza
        introStartBtn.addEventListener('click', () => {
            introScreen.style.display = 'none';
            document.getElementById('race-selection').style.display = 'flex';
        });

        // --- Variables Globales 3D ---
        let scene, camera, renderer, controls;
        let spriteTexture;
        let spriteMaterial;
        let spritePlanes = []; 

        // --- Lógica de la App ---
        function startGame(race) {
            document.getElementById('race-selection').style.display = 'none';
            document.getElementById('builder-ui').style.display = 'block';
            document.getElementById('current-race').innerText = race.toUpperCase();
            
            initThree();
            updateSprite();
            animate();
        }

        // --- Configuración Three.js (El Escritorio 3D) ---
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            scene.fog = new THREE.Fog(0x1a1a1a, 10, 30);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1, 0);
            controls.maxPolarAngle = Math.PI / 2.1; 
            controls.minDistance = 3;
            controls.maxDistance = 15;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const deskLamp = new THREE.SpotLight(0xffe0b0, 1.5);
            deskLamp.position.set(0, 8, 2);
            deskLamp.target.position.set(0, 0, 0);
            deskLamp.castShadow = true;
            scene.add(deskLamp);
            scene.add(deskLamp.target);

            const deskGeo = new THREE.BoxGeometry(10, 0.5, 8);
            const deskMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a });
            const desk = new THREE.Mesh(deskGeo, deskMat);
            desk.position.y = -0.25;
            scene.add(desk);

            const paintColors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff];
            for(let i=0; i<6; i++) {
                const potGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.4, 8);
                const potMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const pot = new THREE.Mesh(potGeo, potMat);
                pot.position.set(-3.5 + (i%3)*0.5, 0.2, 2.5 - Math.floor(i/3)*0.5);
                scene.add(pot);

                const paintGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.1, 8);
                const paintMat = new THREE.MeshStandardMaterial({ color: paintColors[i] });
                const paint = new THREE.Mesh(paintGeo, paintMat);
                paint.position.copy(pot.position);
                paint.position.y = 0.45;
                scene.add(paint);
            }

            const glueGeo = new THREE.CylinderGeometry(0.15, 0.15, 1, 8);
            const glueMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const glue = new THREE.Mesh(glueGeo, glueMat);
            glue.position.set(3.5, 0.5, 2.5);
            glue.rotation.z = Math.PI / 2;
            scene.add(glue);

            const spriteCanvas = document.createElement('canvas');
            spriteCanvas.width = 256;
            spriteCanvas.height = 256;
            spriteTexture = new THREE.CanvasTexture(spriteCanvas);
            spriteTexture.magFilter = THREE.NearestFilter; 
            spriteTexture.minFilter = THREE.NearestFilter;

            spriteMaterial = new THREE.MeshBasicMaterial({ 
                map: spriteTexture, 
                transparent: true, 
                side: THREE.DoubleSide 
            });

            for(let i=0; i<3; i++) {
                const planeGeo = new THREE.PlaneGeometry(2, 2);
                const plane = new THREE.Mesh(planeGeo, spriteMaterial);
                plane.position.set(-2 + i*2, 1, 0);
                scene.add(plane);
                spritePlanes.push(plane);
            }

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            spritePlanes.forEach(plane => {
                plane.lookAt(camera.position);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // --- Motor de Pixel Art 2D ---
        function updateSprite() {
            const canvas = spriteTexture.image;
            const ctx = canvas.getContext('2d');
            const resolution = 32; 
            const scale = canvas.width / resolution;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = false;

            const unitType = document.getElementById('unit-type').value;
            const weapon = document.getElementById('weapon-type').value;
            const shield = document.getElementById('shield-type').value;
            const banner = document.getElementById('banner-type').value;
            
            const cBase = document.getElementById('color-base').value;
            const cPrim = document.getElementById('color-primary').value;
            const cSec = document.getElementById('color-secondary').value;
            const cBan = document.getElementById('color-banner').value;

            function p(x, y, color) {
                ctx.fillStyle = color;
                ctx.fillRect(x * scale, y * scale, scale, scale);
            }

            function shade(color, percent) {
                let R = parseInt(color.substring(1,3),16);
                let G = parseInt(color.substring(3,5),16);
                let B = parseInt(color.substring(5,7),16);
                R = Math.max(0, Math.min(255, R - percent));
                G = Math.max(0, Math.min(255, G - percent));
                B = Math.max(0, Math.min(255, B - percent));
                return "#" + R.toString(16).padStart(2,'0') + G.toString(16).padStart(2,'0') + B.toString(16).padStart(2,'0');
            }

            const cPrimDark = shade(cPrim, 40);
            const cSecDark = shade(cSec, 40);

            let baseY = 20; 
            if(unitType === 'caballeria') baseY = 24; 

            // Base de la miniatura
            for(let x=10; x<22; x++) p(x, baseY+1, cBase);
            for(let x=11; x<21; x++) p(x, baseY+2, shade(cBase, 20));

            if(unitType === 'infanteria') {
                // Piernas y cuerpo
                for(let y=14; y<20; y++) {
                    p(13, y, cPrimDark); p(14, y, cPrim);
                    p(17, y, cPrim); p(18, y, cPrimDark);
                }
                // Torso/Armadura
                for(let y=10; y<14; y++) {
                    for(let x=12; x<20; x++) p(x, y, (x%2===0) ? cPrim : cPrimDark);
                }
                // Decoración del pecho (Secundario)
                p(15, 11, cSec); p(16, 11, cSec);
                p(15, 12, cSecDark); p(16, 12, cSecDark);

                // Cabeza (piel genérica)
                for(let y=6; y<10; y++) {
                    for(let x=13; x<18; x++) p(x, y, "#e0ac69");
                }
                // Casco
                for(let y=4; y<7; y++) {
                    for(let x=12; x<19; x++) p(x, y, (y===4) ? cSec : cSecDark);
                }
                p(15, 3, cSec); // Punto del casco

            } else if (unitType === 'caballeria') {
                // Caballo
                for(let y=18; y<24; y++) {
                    for(let x=8; x<24; x++) {
                        if(y < 23) p(x, y, (x%2===0) ? "#4a3018" : "#3a2410");
                    }
                }
                // Cabeza caballo
                for(let y=16; y<20; y++) {
                    p(22, y, "#4a3018"); p(23, y, "#3a2410");
                }
                // Jinete (Cuerpo)
                for(let y=11; y<17; y++) {
                    for(let x=13; x<19; x++) p(x, y, (x%2===0) ? cPrim : cPrimDark);
                }
                // Jinete (Cabeza)
                 for(let y=7; y<11; y++) {
                    for(let x=14; x<18; x++) p(x, y, "#e0ac69");
                }
                // Casco Jinete
                for(let y=5; y<8; y++) {
                    for(let x=13; x<19; x++) p(x, y, cSecDark);
                }
                p(15, 4, cSec);
            }

            // --- Armas ---
            if(weapon === 'espada') {
                for(let y=4; y<14; y++) p(20, y, "#cccccc");
                p(20, 14, "#8b5a2b"); 
            } else if(weapon === 'lanza') {
                for(let y=2; y<18; y++) p(21, y, "#8b5a2b");
                p(21, 1, "#aaaaaa"); p(21, 2, "#aaaaaa"); 
            } else if(weapon === 'arco') {
                for(let y=8; y<18; y++) {
                    p(21, y, "#8b5a2b");
                }
                p(20, 8, "#e0e0e0"); p(20, 9, "#e0e0e0"); 
            }

            // --- Escudo ---
            if(shield === 'escudo') {
                for(let y=11; y<16; y++) {
                    for(let x=8; x<13; x++) {
                        if(x > 8 && x < 12 && y > 11 && y < 15) {
                             p(x, y, (x%2===0) ? cSec : cSecDark);
                        }
                    }
                }
            }

            // --- Estandarte ---
            if(banner === 'estandarte') {
                for(let y=2; y<18; y++) p(11, y, "#8b5a2b"); 
                for(let y=3; y<10; y++) {
                    for(let x=7; x<11; x++) p(x, y, (y%2===0) ? cBan : shade(cBan, 30));
                }
            }

            spriteTexture.needsUpdate = true;
        }
    </script>
</body>
</html>
